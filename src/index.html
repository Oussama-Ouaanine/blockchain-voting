<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Voting DApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🗳️ Electronic Voting</h1>
        
        <div id="wallet-section">
            <button id="connect-btn" onclick="App.connectWallet()">Connect Wallet</button>
            <p id="account-address">Not connected</p>
        </div>

        <div id="voting-section" style="display: none;">
            <h2>Candidates</h2>
            <table id="candidates-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Votes</th>
                    </tr>
                </thead>
                <tbody id="candidates-list">
                    <!-- Candidates will be loaded here -->
                </tbody>
            </table>
            
            <hr>
            
            <h3>Cast Your Vote</h3>
            <form id="vote-form" onsubmit="App.castVote(); return false;">
                <select id="candidate-select" required>
                    <option value="" disabled selected>Select a candidate...</option>
                </select>
                <button type="submit">Vote</button>
            </form>
            <p id="voting-status"></p>
        </div>
        
    </div>

    <!-- Web3 and Truffle contract dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@truffle/contract@4.3.5/dist/truffle-contract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
